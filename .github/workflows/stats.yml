name: Generate and update GitHub Stats

on:
  push:
    branches:
      - master
  schedule:
    # Runs automatically every day at 00:00 UTC (7 AM Vietnam time)
    - cron: '0 0 * * *'
  # Allows you to manually trigger it from the "Actions" tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit the new SVG image back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@main
        with:
          card: stats
          options: username=catmans1&show_icons=true&theme=buefy&include_all_commits=true&count_private=true
          path: github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@main
        with:
          card: top-langs
          options: username=catmans1&layout=compact&theme=buefy&count_private=true
          path: github-top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=catmans1&theme=buefy
          path: github-streak-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: 'username=catmans1&theme=buefy&column=7'
          path: github-trophy.svg
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg github-top-langs.svg github-streak-stats.svg github-trophy.svg
          git commit -m "Update GitHub Stats, Streak, Languages, and Trophies" || exit 0
          git push
